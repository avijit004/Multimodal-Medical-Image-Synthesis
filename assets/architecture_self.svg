<text x="525" y="508" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">L2-normalised · 64-dim</text>
</g>

<!-- ── positive pair annotation between the two embeddings ── -->
<line x1="235" y1="496" x2="445" y2="496" style="stroke:rgb(93,202,165);stroke-width:1px;stroke-dasharray:5px,3px"/>
<text x="340" y="486" text-anchor="middle" style="fill:rgb(93,202,165);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:11px">positive pair ✓</text>

<!-- ── convergence paths: embeddings → NT-Xent ───────────── -->
<path d="M155,524 L155,556 L285,556 L285,574" fill="none" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<path d="M525,524 L525,556 L395,556 L395,574" fill="none" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- ── NT-Xent loss box ───────────────────────────────────── -->
<g>
<rect x="195" y="574" width="290" height="56" rx="8" stroke-width="0.5" style="fill:rgb(121,31,31);stroke:rgb(240,149,149)"/>
<text x="340" y="596" text-anchor="middle" dominant-baseline="central" style="fill:rgb(247,193,193);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">NT-Xent Loss</text>
<text x="340" y="614" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,149,149);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">temperature  τ = 0.07</text>
</g>

<!-- ── bottom annotations ────────────────────────────────── -->
<text x="340" y="651" text-anchor="middle" style="fill:rgb(194,192,182);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">Positive: sim(h_adc_i, h_t2_i) ↑   ·   Negatives: all other N²−N cross-modal pairs in the batch ↓</text>
<text x="340" y="671" text-anchor="middle" style="fill:rgb(156,154,146);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:11px">No labels used — alignment learned purely from paired patient structure</text>

</svg>
