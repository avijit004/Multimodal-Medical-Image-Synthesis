<g>
<rect x="75" y="362" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(8,80,65);stroke:rgb(93,202,165)"/>
<text x="155" y="384" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">ProjectionHead_ADC</text>
<text x="155" y="402" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">128 → 64-dim  MLP</text>
</g>
<g>
<rect x="445" y="362" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(8,80,65);stroke:rgb(93,202,165)"/>
<text x="525" y="384" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">ProjectionHead_T2</text>
<text x="525" y="402" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">128 → 64-dim  MLP</text>
</g>

<!-- ── arrows: projection head → embedding ───────────────── -->
<line x1="155" y1="418" x2="155" y2="468" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="525" y1="418" x2="525" y2="468" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- ── L2-normalised embedding output boxes ──────────────── -->
<g>
<rect x="75" y="468" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(99,56,6);stroke:rgb(239,159,39)"/>
<text x="155" y="490" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">h_adc</text>
<text x="155" y="508" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">L2-normalised · 64-dim</text>
