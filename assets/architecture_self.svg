<svg width="100%" viewBox="0 0 680 710" role="img" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0,0,0);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif">Self-supervised cross-modal contrastive learning architecture</title><desc style="fill:rgb(0,0,0);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif">Two parallel encoding paths: a paired ADC and T2 scan from the same patient are independently augmented, passed through separate encoders and projection heads to produce L2-normalised embeddings h_adc and h_t2. The NT-Xent loss pulls the positive pair together and pushes all other cross-modal combinations in the batch apart. No labels are used at any point.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- ── page title ─────────────────────────────────────────── -->
<text x="340" y="26" text-anchor="middle" style="fill:rgb(250,249,245);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Self-Supervised Cross-Modal Contrastive Learning</text>

<!-- ── paired input (center) ─────────────────────────────── -->
<g>
<rect x="255" y="44" width="170" height="56" rx="8" stroke-width="0.5" style="fill:rgb(12,68,124);stroke:rgb(133,183,235)"/>
<text x="340" y="66" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Paired scan (ADC_i, T2_i)</text>
<text x="340" y="84" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">same patient  i</text>
</g>

<!-- ── fork paths: paired input → two branches ───────────── -->
<path d="M295,100 L295,120 L155,120 L155,148" fill="none" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<path d="M385,100 L385,120 L525,120 L525,148" fill="none" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- ── vertical centre divider ───────────────────────────── -->
<line x1="340" y1="116" x2="340" y2="535" style="stroke:rgb(156,154,146);stroke-width:0.5px;stroke-dasharray:4px,4px"/>

<!-- ── branch labels ─────────────────────────────────────── -->
<text x="155" y="136" text-anchor="middle" style="fill:rgb(250,249,245);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">ADC branch</text>
<text x="525" y="136" text-anchor="middle" style="fill:rgb(250,249,245);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">T2 branch</text>

<!-- ── augmentation boxes ────────────────────────────────── -->
<g>
<rect x="75" y="148" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(68,68,65);stroke:rgb(180,178,169)"/>
<text x="155" y="170" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Augmentation</text>
<text x="155" y="188" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">flip · rotate · noise</text>
</g>
<g>
<rect x="445" y="148" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(68,68,65);stroke:rgb(180,178,169)"/>
<text x="525" y="170" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Augmentation</text>
<text x="525" y="188" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">flip · rotate · noise</text>
</g>
<text x="340" y="178" text-anchor="middle" style="fill:rgb(156,154,146);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:11px;font-style:italic">independent</text>

<!-- ── arrows: augmentation → encoder ───────────────────── -->
<line x1="155" y1="204" x2="155" y2="254" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="525" y1="204" x2="525" y2="254" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

<!-- ── encoder boxes ─────────────────────────────────────── -->
<g>
<rect x="75" y="254" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(60,52,137);stroke:rgb(175,169,236)"/>
<text x="155" y="276" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Encoder_ADC</text>
<text x="155" y="294" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">64×64 → 128-dim  z</text>
</g>
<g>
<rect x="445" y="254" width="160" height="56" rx="8" stroke-width="0.5" style="fill:rgb(60,52,137);stroke:rgb(175,169,236)"/>
<text x="525" y="276" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:14px;font-weight:500">Encoder_T2</text>
<text x="525" y="294" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);stroke:none;font-family:&quot;Anthropic Sans&quot;,-apple-system,&quot;system-ui&quot;,&quot;Segoe UI&quot;,sans-serif;font-size:12px">64×64 → 128-dim  z</text>
</g>

<!-- ── arrows: encoder → projection head ─────────────────── -->
<line x1="155" y1="310" x2="155" y2="362" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>
<line x1="525" y1="310" x2="525" y2="362" marker-end="url(#arrow)" style="stroke:rgb(156,154,146);stroke-width:1.5px"/>

